<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
    <style>
        body { margin: 0; background: black; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="heartCanvas"></canvas>

<script>
    const canvas = document.getElementById('heartCanvas');
    const ctx = canvas.getContext('2d');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const phrases = [];
    const text = "처채횪챘챔 찼청챰챵챨챤";
    const totalPhrases = 75; // 횎챤챘챔첨책챰챵창챤 챠횪채챦챔챰책챕

    // 횊챠챔철챔횪챘챔챌횪철챔첼 척챨횪챌
    for (let i = 0; i < totalPhrases; i++) {
        phrases.push({
            t: (i / totalPhrases) * Math.PI * 2, // 횒횪첨횪챘체챠횪첼 챦챤챌챔철챔첼 챠횪 챗챨챔창챤챕
            speed: 0.01 + Math.random() * 0.02   // 횗챗챤챨챤챰챵체 채창챔챈책챠챔첼
        });
    }

    function draw() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.1)'; // 횦척척책챗챵 첩챘책챕척횪
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.font = '16px Arial';
        ctx.fillStyle = '#ff7b9c'; // 횖챤챌챤창청챕 철창책챵

        phrases.forEach(p => {
            // 횑횪챵책챙횪챵챔챗횪 챰책챨채철횪
            const x = 16 * Math.pow(Math.sin(p.t), 3);
            const y = -(13 * Math.cos(p.t) - 5 * Math.cos(2 * p.t) - 2 * Math.cos(3 * p.t) - Math.cos(4 * p.t));

            // 횑횪챰첩챵횪찼챔챨처책챙 챔 철책챠챵챨챔챨처책챙
            const posX = canvas.width / 2 + x * 15;
            const posY = canvas.height / 2 + y * 15;

            // 횖챔챰처책챙 챵책챗챰챵
            ctx.save();
            ctx.translate(posX, posY);
            ctx.rotate(p.t + Math.PI / 2); // 횕챤창챤챨횪첨챔창횪책챙 챵책챗챰챵 챦챤 챵챨횪책챗챵챤챨챔챔
            ctx.fillText(text, 0, 0);
            ctx.restore();

            // 횆창챔찾횪책챙 척챨횪챌처 챦챤 챗챨처찾처
            p.t += 0.01;
        });

        requestAnimationFrame(draw);
    }

    draw();
</script>
</body>
</html>
