<!DOCTYPE html><html><head>    <style>        body { margin: 0; background: black; overflow: hidden; }        canvas { display: block; }    </style></head><body>    <canvas id="heartCanvas"></canvas><script>    const canvas = document.getElementById('heartCanvas');    const ctx = canvas.getContext('2d');    canvas.width = window.innerWidth;    canvas.height = window.innerHeight;    const phrases = [];    const text = "удали быстро";    const totalPhrases = 75; // Количество надписей    // Инициализация фраз    for (let i = 0; i < totalPhrases; i++) {        phrases.push({            t: (i / totalPhrases) * Math.PI * 2, // Начальная позиция на кривой            speed: 0.01 + Math.random() * 0.02   // Скорость движения        });    }    function draw() {        ctx.fillStyle = 'rgba(0, 0, 0, 0.1)'; // Эффект шлейфа        ctx.fillRect(0, 0, canvas.width, canvas.height);        ctx.font = '16px Arial';        ctx.fillStyle = '#ff7b9c'; // Розовый цвет        phrases.forEach(p => {            // Математика сердца            const x = 16 * Math.pow(Math.sin(p.t), 3);            const y = -(13 * Math.cos(p.t) - 5 * Math.cos(2 * p.t) - 2 * Math.cos(3 * p.t) - Math.cos(4 * p.t));            // Масштабируем и центрируем            const posX = canvas.width / 2 + x * 15;            const posY = canvas.height / 2 + y * 15;            // Рисуем текст            ctx.save();            ctx.translate(posX, posY);            ctx.rotate(p.t + Math.PI / 2); // Поворачиваем текст по траектории            ctx.fillText(text, 0, 0);            ctx.restore();            // Двигаем фразу по кругу            p.t += 0.01;        });        requestAnimationFrame(draw);    }    draw();</script></body></html>
