<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Heart Animation</title>
    <style>
        body { margin: 0; background: black; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="heartCanvas"></canvas>

<script>
    const canvas = document.getElementById('heartCanvas');
    const ctx = canvas.getContext('2d');

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    const phrases = [];
    // "удали быстро" на языке кодов, чтобы не было кракозябр
    const text = "\u0443\u0434\u0430\u043B\u0438\u0020\u0431\u044B\u0441\u0442\u0440\u043E"; 
    const totalPhrases = 55; // Еще меньше фраз для идеальной читаемости

    for (let i = 0; i < totalPhrases; i++) {
        phrases.push({
            t: (i / totalPhrases) * Math.PI * 2, 
            speed: 0.005
        });
    }

    function draw() {
        ctx.fillStyle = 'black';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Используем стандартный шрифт, который точно есть в системе
        ctx.font = 'bold 20px sans-serif'; 
        ctx.fillStyle = '#ff7b9c'; 
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#ff7b9c';
        ctx.textAlign = "center";

        phrases.forEach(p => {
            const x = 16 * Math.pow(Math.sin(p.t), 3);
            const y = -(13 * Math.cos(p.t) - 5 * Math.cos(2 * p.t) - 2 * Math.cos(3 * p.t) - Math.cos(4 * p.t));

            // Сделал сердце чуть больше (множитель 20)
            const posX = canvas.width / 2 + x * 20;
            const posY = canvas.height / 2 + y * 20;

            ctx.save();
            ctx.translate(posX, posY);
            ctx.rotate(p.t + Math.PI / 2); 
            ctx.fillText(text, 0, 0);
            ctx.restore();

            p.t += 0.008; 
        });

        requestAnimationFrame(draw);
    }

    draw();
</script>
</body>
</html>
